version: '3.8'

services:
  # Backend Python (FastAPI)
  backend-python:
    build: .
    container_name: aws-services-python
    ports:
      - "8000:8000"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
    volumes:
      - ./app:/app/app
    networks:
      - aws-services-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: aws-services-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=awsuser
      - POSTGRES_PASSWORD=awspass
      - POSTGRES_DB=awsservices
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - aws-services-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U awsuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ (Mensageria)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: aws-services-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - aws-services-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus (Métricas)
  prometheus:
    image: prom/prometheus:latest
    container_name: aws-services-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - aws-services-network

  # Grafana (Visualização)
  grafana:
    image: grafana/grafana:latest
    container_name: aws-services-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - aws-services-network
    depends_on:
      - prometheus

networks:
  aws-services-network:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
  prometheus-data:
  grafana-data:
