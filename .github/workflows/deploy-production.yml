name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: us-east-1
  NODE_VERSION: '18'

jobs:
  ai-audit:
    name: AI Audit (6 Agents)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install boto3

      - name: Run AI Audit
        run: python scripts/agents/ai-audit.py

  build:
    name: Build Frontend
    needs: ai-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install dependencies
        run: cd frontend-next && npm ci

      - name: Build Next.js
        run: cd frontend-next && npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: frontend-next/out/
          retention-days: 7

  deploy:
    name: Deploy to S3 + CloudFront
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: out/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync out/ s3://${{ secrets.S3_BUCKET_FRONTEND }}/aws-services/ \
            --delete \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/aws-services/*"

  health-check:
    name: Health Check
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check Frontend
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://aws-services.sstechnologies-cloud.com)
          if [ "$response" -ne 200 ]; then
            echo "❌ Frontend failed (HTTP $response)"
            exit 1
          fi
          echo "✅ Frontend OK (HTTP $response)"

  finops:
    name: FinOps Report
    needs: health-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install boto3

      - name: Run FinOps Report
        env:
          FINOPS_EMAIL: senanetworker@gmail.com
          GITHUB_SHA: ${{ github.sha }}
        run: python scripts/finops/cost-report.py

  notify:
    name: Deploy Status
    needs: [health-check, finops]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Success
        if: needs.health-check.result == 'success'
        run: |
          echo "✅ Deploy concluído com sucesso!"
          echo "URL: https://aws-services.sstechnologies-cloud.com"
          echo "Commit: ${{ github.sha }}"

      - name: Failed
        if: needs.health-check.result != 'success'
        run: |
          echo "❌ Deploy falhou!"
          exit 1
