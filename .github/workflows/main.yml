name: CI/CD Pipeline

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend-python: ${{ steps.filter.outputs.backend-python }}
      backend-node: ${{ steps.filter.outputs.backend-node }}
      frontend: ${{ steps.filter.outputs.frontend }}
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend-python:
              - 'backend-python/**'
            backend-node:
              - 'backend/**'
            frontend:
              - 'frontend-next/**'
            terraform:
              - 'terraform/**'

  backend-python:
    name: Backend Python
    needs: changes
    if: needs.changes.outputs.backend-python == 'true'
    uses: ./.github/workflows/backend-python.yml
    secrets: inherit

  backend-node:
    name: Backend Node.js
    needs: changes
    if: needs.changes.outputs.backend-node == 'true'
    uses: ./.github/workflows/backend-node.yml
    secrets: inherit

  frontend:
    name: Frontend Next.js
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    uses: ./.github/workflows/frontend.yml
    secrets: inherit

  terraform:
    name: Terraform
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    uses: ./.github/workflows/terraform.yml
    secrets: inherit

  status:
    name: CI/CD Status
    runs-on: ubuntu-latest
    needs: [backend-python, backend-node, frontend, terraform]
    if: always()
    steps:
      - name: Check status
        run: |
          echo "✅ CI/CD Pipeline completed"
          echo "Backend Python: ${{ needs.backend-python.result }}"
          echo "Backend Node: ${{ needs.backend-node.result }}"
          echo "Frontend: ${{ needs.frontend.result }}"
          echo "Terraform: ${{ needs.terraform.result }}"
