apiVersion: v1
kind: Secret
metadata:
  name: aws-credentials
  namespace: aws-services
type: Opaque
stringData:
  # IMPORTANTE: Substitua com suas credenciais AWS reais
  # NÃO commite este arquivo com credenciais reais!
  # Use kubectl create secret ou ferramentas como Sealed Secrets
  
  access-key-id: "YOUR_AWS_ACCESS_KEY_ID"
  secret-access-key: "YOUR_AWS_SECRET_ACCESS_KEY"

---
# Exemplo de como criar o secret via kubectl:
# kubectl create secret generic aws-credentials \
#   --from-literal=access-key-id=YOUR_ACCESS_KEY \
#   --from-literal=secret-access-key=YOUR_SECRET_KEY \
#   --namespace=aws-services

# Ou usando arquivo .env:
# kubectl create secret generic aws-credentials \
#   --from-env-file=.env \
#   --namespace=aws-services
