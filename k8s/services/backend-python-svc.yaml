apiVersion: v1
kind: Service
metadata:
  name: backend-python
  namespace: aws-services
  labels:
    app: backend-python
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: backend-python
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
