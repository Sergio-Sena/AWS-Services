apiVersion: v1
kind: Namespace
metadata:
  name: aws-services
  labels:
    name: aws-services
    environment: production
    project: aws-services-dashboard
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: aws-services-quota
  namespace: aws-services
spec:
  hard:
    requests.cpu: "10"
    requests.memory: "20Gi"
    limits.cpu: "20"
    limits.memory: "40Gi"
    persistentvolumeclaims: "10"
    services.loadbalancers: "2"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: aws-services-limits
  namespace: aws-services
spec:
  limits:
  - max:
      cpu: "2"
      memory: "4Gi"
    min:
      cpu: "50m"
      memory: "64Mi"
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "250m"
      memory: "256Mi"
    type: Container
