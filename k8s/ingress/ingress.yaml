apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aws-services-ingress
  namespace: aws-services
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization,access_key,secret_key"
spec:
  tls:
  - hosts:
    - aws-services.example.com
    secretName: aws-services-tls
  rules:
  - host: aws-services.example.com
    http:
      paths:
      # Frontend
      - path: /()(.*)
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
      # Backend Python API
      - path: /api/python(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: backend-python
            port:
              number: 8000
      # Backend Node.js API
      - path: /api(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: backend-node
            port:
              number: 8000
