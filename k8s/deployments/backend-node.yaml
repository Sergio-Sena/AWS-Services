apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-node
  namespace: aws-services
  labels:
    app: backend-node
    tier: backend
    language: nodejs
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-node
  template:
    metadata:
      labels:
        app: backend-node
        tier: backend
        language: nodejs
    spec:
      containers:
      - name: backend-node
        image: node:18-alpine
        imagePullPolicy: IfNotPresent
        workingDir: /app
        command: ["node", "server.js"]
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: AWS_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: access-key-id
        - name: AWS_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: secret-access-key
        - name: PORT
          value: "8000"
        - name: NODE_ENV
          value: "production"
        volumeMounts:
        - name: backend-code
          mountPath: /app
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: backend-code
        configMap:
          name: backend-node-code
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-node-hpa
  namespace: aws-services
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-node
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
